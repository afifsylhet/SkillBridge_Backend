<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SkillBridge API</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: grid; place-items: center;
        background: #0b0d10; color: #e6e8ea;
      }
      main {
        max-width: 32rem; padding: 2rem; text-align: center;
        border: 1px solid #1f2328; border-radius: 12px;
        background: #11141a;
      }
      h1 { margin: 0 0 .5rem; font-size: 1.5rem; }
      p  { margin: .25rem 0; color: #9aa4ad; }
      code { background: #1f2328; padding: .15rem .4rem; border-radius: 6px; }
      a { color: #6cb2ff; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main>
      <h1>SkillBridge API</h1>
      <p>This origin serves the JSON API only. Try:</p>
      <p><a href="/api/health"><code>GET /api/health</code></a></p>
      <p>Endpoints are mounted under <code>/api</code>.</p>
    </main>
  </body>
</html>
